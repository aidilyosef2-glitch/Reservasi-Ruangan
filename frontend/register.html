<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - Reservasi Gedung Polinela</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-wrapper { display: flex; min-height: 100vh; }
        .auth-sidebar { 
            flex: 1.2; 
            background: url('assets/images/polinela_building.png') center/cover;
            position: relative;
            display: none;
        }
        @media (min-width: 900px) { .auth-sidebar { display: block; } }
        .auth-sidebar::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(15, 23, 42, 0.9));
        }
        .auth-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 2rem; background: var(--bg-dark); position: relative;
        }
        .auth-info {
            position: absolute; bottom: 40px; left: 40px; z-index: 10; color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <div class="auth-info">
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Politeknik Negeri Lampung</h1>
                <p style="font-size: 1.1rem; opacity: 0.9;">Bergabunglah dan Nikmati Kemudahan Reservasi Fasilitas.</p>
            </div>
        </div>
        <div class="auth-content">
            <div class="auth-card glass-card animate-fade-in" style="width: 100%; max-width: 480px; border: none; background: rgba(15, 23, 42, 0.5);">
                <div class="text-center mb-4">
                    <h2>Buat Akun Baru</h2>
                    <p class="text-muted">Daftar sebagai Pemohon (Mahasiswa/Dosen/Unit)</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama Anda" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">NIP / NIM</label>
                        <input type="text" id="nip_nim" class="form-control" placeholder="Masukkan NIP atau NIM" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Masukkan email aktif" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Buat password (min 6 karakter)" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Daftar Sekarang</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted" style="font-size: 0.9rem;">Sudah punya akun? <a href="login.html">Login disini</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const nip_nim = document.getElementById('nip_nim').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({ nama, nip_nim, email, password }) });
            if (res.status === 'success') { showToast(res.message, 'success'); setTimeout(() => { window.location.href = 'login.html'; }, 2000); } 
            else { showToast(res.message, 'danger'); }
        });
    </script>
</body>
</html>
