<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Gedung - Admin Polinela</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo" style="background: linear-gradient(135deg, #ef4444, #f59e0b);">A</div>
                <h3>Admin Panel</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="sidebar-link"><i class="fas fa-chart-pie"></i> Command Center</a></li>
                <li><a href="kelola_reservasi.html" class="sidebar-link"><i class="fas fa-tasks"></i> Approval Reservasi</a></li>
                <li><a href="kelola_gedung.html" class="sidebar-link active"><i class="fas fa-building"></i> Master Gedung</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2>Master Data Gedung</h2>
            </header>

            <div class="glass-card mt-4">
                <div class="d-flex justify-between align-center mb-4">
                    <h3>Daftar Gedung & Ruangan</h3>
                    <button class="btn btn-primary" onclick="openGedungModal()"><i class="fas fa-plus"></i> Tambah Gedung</button>
                </div>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Kode</th>
                                <th>Nama Gedung</th>
                                <th>Lokasi</th>
                                <th>Kapasitas</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="6" class="text-center text-muted">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form Gedung -->
    <div id="gedungModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="glass-card" style="width: 500px; max-width: 90%;">
            <h3 id="modalTitle">Tambah Gedung Baru</h3>
            <form id="gedungForm" class="mt-3">
                <input type="hidden" id="gedung_id">
                <div class="form-group">
                    <label class="form-label">Kode Gedung</label>
                    <input type="text" id="kode_gedung" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Nama Gedung</label>
                    <input type="text" id="nama_gedung" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Lokasi</label>
                    <input type="text" id="lokasi" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Kapasitas</label>
                    <input type="number" id="kapasitas" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Status Operasional</label>
                    <select id="status_operasional" class="form-control">
                        <option value="aktif">Aktif (Tersedia)</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="nonaktif">Nonaktif</option>
                    </select>
                </div>
                <div class="d-flex gap-2 justify-between mt-4">
                    <button type="button" class="btn btn-outline" onclick="closeGedungModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if(!user || (user.role !== 'superadmin' && user.role !== 'admin_gedung')) { window.location.href = '../login.html'; return; }
            loadGedung();
        });

        async function loadGedung() {
            const res = await apiFetch('/gedung');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(res.status === 'success' && res.data.length > 0) {
                res.data.forEach(g => {
                    let badge = g.status_operasional === 'aktif' ? '<span class="badge badge-approved">Aktif</span>' : '<span class="badge badge-pending">Maintenance</span>';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${g.kode_gedung}</td>
                        <td><strong>${g.nama_gedung}</strong></td>
                        <td>${g.lokasi}</td>
                        <td>${g.kapasitas} Org</td>
                        <td>${badge}</td>
                        <td>
                            <button class="btn btn-danger" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="hapusGedung(${g.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else { tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">Belum ada data gedung.</td></tr>`; }
        }

        function openGedungModal() {
            document.getElementById('gedungForm').reset();
            document.getElementById('gedung_id').value = '';
            document.getElementById('gedungModal').style.display = 'flex';
        }

        function closeGedungModal() { document.getElementById('gedungModal').style.display = 'none'; }

        document.getElementById('gedungForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('gedung_id').value;
            const payload = {
                kode_gedung: document.getElementById('kode_gedung').value,
                nama_gedung: document.getElementById('nama_gedung').value,
                lokasi: document.getElementById('lokasi').value,
                kapasitas: document.getElementById('kapasitas').value,
                status_operasional: document.getElementById('status_operasional').value
            };
            
            const method = id ? 'PUT' : 'POST';
            const endpoint = id ? `/gedung/${id}` : '/gedung';
            
            const res = await apiFetch(endpoint, { method, body: JSON.stringify(payload) });
            if(res.status === 'success') { showToast(res.message, 'success'); closeGedungModal(); loadGedung(); } 
            else { showToast(res.message, 'danger'); }
        });

        async function hapusGedung(id) {
            if(confirm('Yakin ingin menghapus gedung ini?')) {
                const res = await apiFetch(`/gedung/${id}`, { method: 'DELETE' });
                if(res.status === 'success') { showToast('Gedung dihapus', 'success'); loadGedung(); }
            }
        }
    </script>
</body>
</html>
