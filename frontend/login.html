<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Reservasi Gedung Polinela</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-wrapper { display: flex; min-height: 100vh; }
        .auth-sidebar { 
            flex: 1.2; 
            background: url('assets/images/polinela_building.png') center/cover;
            position: relative;
            display: none;
        }
        @media (min-width: 900px) { .auth-sidebar { display: block; } }
        .auth-sidebar::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(15, 23, 42, 0.9));
        }
        .auth-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 2rem; background: var(--bg-dark); position: relative;
        }
        .auth-info {
            position: absolute; bottom: 40px; left: 40px; z-index: 10; color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-sidebar">
            <div class="auth-info">
                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Politeknik Negeri Lampung</h1>
                <p style="font-size: 1.1rem; opacity: 0.9;">Fasilitas Modern untuk Kegiatan Akademik yang Unggul.</p>
            </div>
        </div>
        <div class="auth-content">
            <div class="auth-card glass-card animate-fade-in" style="width: 100%; max-width: 450px; border: none; background: rgba(15, 23, 42, 0.5);">
                <div class="text-center mb-4">
                    <h2>Selamat Datang</h2>
                    <p class="text-muted">Sistem Reservasi Gedung Polinela</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email / NIP / NIM</label>
                        <input type="email" id="email" class="form-control" placeholder="Masukkan email Anda" required value="admin@polinela.ac.id">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Masukkan password" required value="admin123">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login Sekarang</button>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted" style="font-size: 0.9rem;">Belum punya akun? <a href="register.html">Daftar disini</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
            if (res.status === 'success') {
                localStorage.setItem('token', res.data.token);
                showToast('Login berhasil! Mengalihkan...', 'success');
                setTimeout(() => {
                    if (res.data.role === 'superadmin' || res.data.role === 'admin_gedung') { window.location.href = 'admin/index.html'; }
                    else { window.location.href = 'pemohon/index.html'; }
                }, 1500);
            } else { showToast(res.message, 'danger'); }
        });
    </script>
</body>
</html>
