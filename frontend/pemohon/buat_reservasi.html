<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Reservasi - Polinela</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Polinela</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="buat_reservasi.html" class="sidebar-link active"><i class="fas fa-calendar-plus"></i> Buat Reservasi</a></li>
                <li><a href="katalog_gedung.html" class="sidebar-link"><i class="fas fa-building"></i> Katalog Gedung</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="d-flex align-center gap-2">
                    <h2>Formulir Pengajuan Reservasi</h2>
                </div>
            </header>

            <div class="glass-card" style="max-width: 800px; margin: 0 auto;">
                <form id="reservasiForm">
                    <div class="form-group">
                        <label class="form-label">Pilih Gedung</label>
                        <select id="gedung_id" class="form-control" required>
                            <option value="">-- Pilih Gedung --</option>
                            <!-- Dimuat dengan JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jenis / Nama Kegiatan</label>
                        <input type="text" id="jenis_kegiatan" class="form-control" placeholder="Contoh: Seminar Nasional Teknologi Pertanian" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Jumlah Peserta (Perkiraan)</label>
                        <input type="number" id="jumlah_peserta" class="form-control" placeholder="Contoh: 150" required min="1">
                    </div>

                    <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="form-group">
                            <label class="form-label">Waktu Mulai</label>
                            <input type="datetime-local" id="waktu_mulai" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Waktu Selesai</label>
                            <input type="datetime-local" id="waktu_selesai" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="text-right mt-3">
                        <button type="button" class="btn btn-outline" id="btnCheck">Cek Ketersediaan Jadwal</button>
                    </div>

                    <div id="availability-alert" class="mt-3" style="display: none; padding: 1rem; border-radius: 8px;"></div>

                    <hr style="border: 0; border-top: 1px solid var(--card-border); margin: 2rem 0;">

                    <button type="submit" class="btn btn-primary" id="btnSubmit" disabled style="width: 100%;">Ajukan Reservasi</button>
                </form>
            </div>
        </main>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if(!user || user.role !== 'pemohon') {
                window.location.href = '../login.html';
                return;
            }

            // Load Gedung Options
            const res = await apiFetch('/gedung');
            if(res.status === 'success') {
                const select = document.getElementById('gedung_id');
                res.data.forEach(g => {
                    if(g.status_operasional === 'aktif') {
                        const opt = document.createElement('option');
                        opt.value = g.id;
                        opt.textContent = `${g.nama_gedung} (Kapasitas: ${g.kapasitas} orang) - ${g.lokasi}`;
                        select.appendChild(opt);
                    }
                });
            }
        });

        const alertBox = document.getElementById('availability-alert');
        const btnSubmit = document.getElementById('btnSubmit');

        document.getElementById('btnCheck').addEventListener('click', async () => {
            const gedung_id = document.getElementById('gedung_id').value;
            const waktu_mulai = document.getElementById('waktu_mulai').value;
            const waktu_selesai = document.getElementById('waktu_selesai').value;

            if(!gedung_id || !waktu_mulai || !waktu_selesai) {
                showToast('Pilih gedung dan rentang waktu terlebih dahulu.', 'warning');
                return;
            }

            // Validasi client-side: waktu selesai harus lebih dari waktu mulai
            if(new Date(waktu_selesai) <= new Date(waktu_mulai)) {
                showToast('Waktu selesai harus lebih besar dari waktu mulai.', 'warning');
                return;
            }

            const res = await apiFetch('/reservasi/check-availability', {
                method: 'POST',
                body: JSON.stringify({ gedung_id, waktu_mulai, waktu_selesai })
            });

            alertBox.style.display = 'block';
            if(res.status === 'success') {
                if(res.available) {
                    alertBox.style.background = 'rgba(16, 185, 129, 0.2)';
                    alertBox.style.color = 'var(--success)';
                    alertBox.innerHTML = `<i class="fas fa-check-circle"></i> ${res.message}`;
                    btnSubmit.disabled = false; // Enable submit button
                } else {
                    alertBox.style.background = 'rgba(239, 68, 68, 0.2)';
                    alertBox.style.color = 'var(--danger)';
                    alertBox.innerHTML = `<i class="fas fa-times-circle"></i> ${res.message}`;
                    btnSubmit.disabled = true;
                }
            } else {
                alertBox.style.display = 'none';
                showToast(res.message, 'danger');
            }
        });

        // Reset check if inputs change
        ['gedung_id', 'waktu_mulai', 'waktu_selesai'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                alertBox.style.display = 'none';
                btnSubmit.disabled = true;
            });
        });

        document.getElementById('reservasiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                gedung_id: document.getElementById('gedung_id').value,
                jenis_kegiatan: document.getElementById('jenis_kegiatan').value,
                jumlah_peserta: document.getElementById('jumlah_peserta').value,
                waktu_mulai: document.getElementById('waktu_mulai').value,
                waktu_selesai: document.getElementById('waktu_selesai').value
            };

            const res = await apiFetch('/reservasi/submit', {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if (res.status === 'success') {
                showToast(res.message, 'success');
                setTimeout(() => {
                    window.location.href = 'index.html'; // Balik ke dashboard pemohon
                }, 2000);
            } else {
                showToast(res.message, 'danger');
            }
        });
    </script>
</body>
</html>
