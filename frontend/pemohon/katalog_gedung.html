<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Gedung - Polinela</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .gedung-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .gedung-card {
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .gedung-img {
            width: 100%;
            height: 200px;
            background: url('../assets/images/polinela_hall.png') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .gedung-img::after {
            content: '';
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: linear-gradient(to top, rgba(15, 23, 42, 1), transparent);
        }
        .gedung-body {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Polinela</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="buat_reservasi.html" class="sidebar-link"><i class="fas fa-calendar-plus"></i> Buat Reservasi</a></li>
                <li><a href="katalog_gedung.html" class="sidebar-link active"><i class="fas fa-building"></i> Katalog Gedung</a></li>
                <li><a href="laporan.html" class="sidebar-link"><i class="fas fa-chart-bar"></i> Laporan Saya</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2>Katalog Gedung & Fasilitas</h2>
            </header>

            <div class="gedung-grid mt-4" id="gedungContainer">
                <!-- Data dimuat dengan JS -->
                <p class="text-muted">Memuat data gedung...</p>
            </div>
        </main>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if(!user || user.role !== 'pemohon') { window.location.href = '../login.html'; return; }
            loadKatalog();
        });

        async function loadKatalog() {
            const res = await apiFetch('/gedung');
            const container = document.getElementById('gedungContainer');
            container.innerHTML = '';
            
            if(res.status === 'success' && res.data.length > 0) {
                res.data.forEach(g => {
                    let badge = g.status_operasional === 'aktif' ? '<span class="badge badge-approved">Tersedia</span>' : '<span class="badge badge-pending">Maintenance</span>';
                    const div = document.createElement('div');
                    div.className = 'glass-card gedung-card animate-fade-in';
                    div.innerHTML = `
                        <div class="gedung-img"></div>
                        <div class="gedung-body">
                            <div class="d-flex justify-between align-center mb-2">
                                <h3>${g.nama_gedung}</h3>
                                ${badge}
                            </div>
                            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 0.5rem;"><i class="fas fa-map-marker-alt"></i> ${g.lokasi}</p>
                            <p class="text-muted" style="font-size: 0.9rem; margin-bottom: 1rem;"><i class="fas fa-users"></i> Kapasitas: ${g.kapasitas} Orang</p>
                            
                            <div style="margin-top: auto;">
                                <a href="buat_reservasi.html?gedung=${g.id}" class="btn btn-outline" style="width: 100%;">
                                    <i class="fas fa-calendar-check"></i> Pesan Ruangan Ini
                                </a>
                            </div>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } else { container.innerHTML = `<p class="text-muted">Belum ada data gedung yang tersedia.</p>`; }
        }
    </script>
</body>
</html>
